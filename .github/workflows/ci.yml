name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    # Only deploy on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        # Add your Render deploy hook URL as a repository secret named
        # RENDER_DEPLOY_HOOK_URL (Settings → Secrets → Actions).
        # Get the URL from: Render dashboard → your service → Settings → Deploy Hook.
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy."
          fi
